name: Akropolis Ticket Monitor

on:
  schedule:
    - cron: '0 7 * * *'    # 09:00 oesterreichische Zeit (UTC+2)
    - cron: '0 10 * * *'   # 12:00 oesterreichische Zeit
    - cron: '0 13 * * *'   # 15:00 oesterreichische Zeit
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ticket-Verfuegbarkeit pruefen & E-Mail senden
        env:
          GMAIL_SENDER:        ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monitor.py
