name: Akropolis Ticket Monitor

on:
  schedule:
    # Zeiten in UTC — Österreich im Sommer = UTC+2 (CEST)
    - cron: '0 7 * * *'   # 09:00 österreichische Zeit
    - cron: '0 10 * * *'  # 12:00 österreichische Zeit
    - cron: '0 13 * * *'  # 15:00 österreichische Zeit

  workflow_dispatch:  # Manuell startbar via GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 (kein Deprecation-Warning)

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install anthropic

      - name: Ticket-Verfügbarkeit prüfen & E-Mail senden
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:        ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monitor.py
